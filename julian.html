<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian - Links & Projects</title>
    
    <link rel="icon" type="image/jpeg" href="pictures/julian.profilbild.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Base Reset & Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            
            /* HINTERGRUNDBILD HIER ANPASSEN */
            /* Wenn du ein echtes Bild hast, ändere 'background.jpg' zum Pfad deines Bildes */
            background-image: url('background.jpg'), linear-gradient(135deg, #ff8a9c, #6c88b5, #192b4d);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Top Left Volume Button */
        .volume-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3b2222;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .volume-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Main Content Wrapper */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 460px;
            z-index: 10;
        }

        /* Glassmorphism Reusable Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* Main Profile Card */
        .profile-card {
            padding: 35px 25px 30px 25px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            color: #3b2222;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 0.95rem;
            color: #4a2a2a;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 1.4rem;
        }

        .social-icons a {
            color: #4a3b3b;
            text-decoration: none;
            transition: transform 0.2s, color 0.2s;
            display: inline-flex;
        }

        .social-icons a:hover {
            transform: translateY(-3px);
            color: #111;
        }

        /* Spezifische Icon-Farben aus dem Screenshot */
        .icon-whatsapp {
            color: #25D366 !important;
        }

        /* View Counter im Card-Eck */
        .view-counter {
            position: absolute;
            bottom: 12px;
            left: 15px;
            font-size: 0.75rem;
            color: #4a2a2a;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        /* Music Player Widget */
        .music-player {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .album-cover {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .track-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .track-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #3b2222;
        }

        .track-progress-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: #5a3c3c;
            font-weight: 600;
        }

        .progress-bar-container {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 10%; /* Repräsentiert 0:03 von 3:30 */
            background: #3b2222;
            border-radius: 2px;
        }

        .playback-controls {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
            margin-left: 5px;
            color: #3b2222;
        }
        
        .playback-controls i {
            cursor: pointer;
        }

        /* Footer Badge (Guns.lol style) */
        .footer-badge {
            position: absolute;
            bottom: 25px;
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 25px 12px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        .footer-badge:hover {
            background: rgba(15, 15, 20, 0.9);
            transform: translateY(-2px);
        }

        .footer-badge-icon {
            font-size: 1.2rem;
            color: #ff5555;
            transform: rotate(-45deg);
        }

        .footer-badge-text {
            display: flex;
            flex-direction: column;
        }

        .footer-badge-text strong {
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .footer-badge-text span {
            font-size: 0.7rem;
            color: #aaaaaa;
        }

        .footer-badge-close {
            margin-left: 10px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <!-- Volume Button -->
    <div class="volume-btn">
        <i class="fas fa-volume-up"></i>
    </div>

    <!-- Main Container -->
    <div class="content-wrapper">
        
        <!-- Profile Card -->
        <main class="glass-panel profile-card">
            <h1>Julian</h1>
            
            <p class="bio">
                🎉 Ich bin Julian ein Content Creator 🎉 Sharing<br>
                vibes! Join the Platforms for fun! 🎉
            </p>

            <div class="social-icons">
                <a href="#" target="_blank"><i class="fa-brands fa-spotify"></i></a>
                <a href="https://twitch.tv/julian442_" target="_blank"><i class="fa-brands fa-twitch"></i></a>
                <a href="https://youtube.com/@Julian_2044" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://dc.gg/ben" target="_blank"><i class="fa-brands fa-discord"></i></a>
                <!-- WhatsApp hat als einziges Icon die Originalfarbe im Bild -->
                <a href="#" target="_blank" class="icon-whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                <!-- Platzhalter für Roblox (ist standardmäßig nicht im Free FontAwesome Set) -->
                <a href="#" target="_blank"><i class="fa-solid fa-gamepad"></i></a>
            </div>

            <div class="view-counter">
                <i class="fas fa-eye"></i> 15
            </div>
        </main>

        <!-- Music Player Widget -->
        <div class="glass-panel music-player">
            <!-- Nutzt dein existierendes Profilbild als Cover -->
            <img src="pictures/julian.profilbild.png" alt="Album Cover" class="album-cover" onerror="this.src='https://via.placeholder.com/50/16141c/ff79c6?text=J'">
            
            <div class="track-details">
                <div class="track-title">You Make me feel alive!</div>
                
                <div class="track-progress-row">
                    <span>0:03</span>
                    <div class="progress-bar-container">
                        <div class="progress-fill"></div>
                    </div>
                    <span>3:30</span>
                    
                    <div class="playback-controls">
                        <i class="fas fa-step-backward"></i>
                        <i class="fas fa-pause"></i>
                        <i class="fas fa-step-forward"></i>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer Banner -->
    <a href="https://github.com/SynergyStation" class="footer-badge" target="_blank">
        <i class="fas fa-link footer-badge-icon"></i>
        <div class="footer-badge-text">
            <strong>guns.lol/you</strong>
            <span>Sichere dir jetzt kostenlos dein Profil!</span>
        </div>
        <i class="fas fa-times footer-badge-close"></i>
    </a>

    <!-- Optional: Script für Volume-Toggle Funktionalität -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const volumeBtn = document.querySelector('.volume-btn i');
            
            volumeBtn.parentElement.addEventListener('click', () => {
                if(volumeBtn.classList.contains('fa-volume-up')) {
                    volumeBtn.classList.replace('fa-volume-up', 'fa-volume-mute');
                } else {
                    volumeBtn.classList.replace('fa-volume-mute', 'fa-volume-up');
                }
            });
        });
    </script>
</body>
</html>
