<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Links</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="https://github.com/identicons/johndoe.png" alt="Profilbild" class="avatar">
            <h1>Dein Name / Username</h1>
            <p class="bio">Hier ist eine kurze Beschreibung über mich oder mein Projekt.</p>
        </div>

        <div class="links">
            <a href="https://github.com" target="_blank" class="link-btn">Mein GitHub</a>
            <a href="https://linkedin.com" target="_blank" class="link-btn">LinkedIn</a>
            <a href="https://twitter.com" target="_blank" class="link-btn">Twitter / X</a>
            <a href="mailto:deine-email@example.com" class="link-btn">Kontakt per E-Mail</a>
        </div>
    </div>

</body>
</html>
